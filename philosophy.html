<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philosophy | Market Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#f6f8fc;
--glass:rgba(255,255,255,0.7);
--border:rgba(0,0,0,0.06);
--text:#0f172a;
--sub:#64748b;
--accent:#2563eb;
--up:#16a34a;
--down:#dc2626;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(120deg,#eef2ff,#f8fafc);
color:var(--text);
height:100vh;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, rgba(37,99,235,.15), transparent),
radial-gradient(circle at 80% 70%, rgba(124,58,237,.15), transparent);
filter:blur(80px);
z-index:-1;
}

/* LAYOUT */
.layout{
display:grid;
grid-template-columns:280px 1fr 280px;
grid-template-rows:50px 1fr 50px;
gap:14px;
padding:14px;
height:100vh;
}

/* TOPBAR */
.topbar{
grid-column:1/-1;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
background:var(--glass);
border:1px solid var(--border);
border-radius:12px;
backdrop-filter:blur(20px);
font-size:13px;
}

.nav a{
margin:0 8px;
text-decoration:none;
color:var(--sub);
}
.nav a:hover{color:var(--accent);}

/* PANEL */
.panel{
background:var(--glass);
border:1px solid var(--border);
border-radius:16px;
padding:15px;
backdrop-filter:blur(20px);
display:flex;
flex-direction:column;
gap:10px;
overflow:hidden;
}

/* STOCKS */
.stock{
display:flex;
justify-content:space-between;
padding:8px;
border-radius:8px;
background:rgba(255,255,255,.6);
font-size:13px;
}

.up{color:var(--up);}
.down{color:var(--down);}

/* CENTER */
.center{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
gap:15px;
}

h1{font-size:2.5rem;}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:var(--accent);
color:#fff;
cursor:pointer;
}

/* FOOTER */
.footer{
grid-column:1/-1;
display:flex;
justify-content:center;
align-items:center;
font-size:12px;
color:var(--sub);
}

/* MOBILE */
@media(max-width:900px){
.layout{grid-template-columns:1fr;height:auto;overflow:auto;}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="layout">

<div class="topbar">
<div><strong>Market Intelligence</strong></div>
<div class="nav">
<a href="#">Home</a>
<a href="#">Philosophy</a>
<a href="#">Systems</a>
</div>
<div id="time"></div>
</div>

<!-- LEFT -->
<div class="panel">
<h3>Live Stocks</h3>
<div id="stocks"></div>

<canvas id="chart1"></canvas>
</div>

<!-- CENTER -->
<div class="panel center">
<h1>Market Intelligence</h1>
<p>Build systems that earn, not interfaces that impress.</p>
<button>Explore Systems</button>
</div>

<!-- RIGHT -->
<div class="panel">
<h3>AI Opportunities</h3>
<p style="font-size:13px;color:var(--sub)">
• AI SaaS<br>
• Data Platforms<br>
• Automation Tools<br>
• Trading Systems
</p>

<canvas id="chart2"></canvas>
</div>

<div class="footer">
© 2026 Intelligence Systems
</div>

</div>

<script>
const stocks=[
{sym:"AAPL",p:220},
{sym:"MSFT",p:415},
{sym:"NVDA",p:870},
{sym:"TSLA",p:190}
];

function render(){
const el=document.getElementById("stocks");
el.innerHTML=stocks.map(s=>`
<div class="stock">
<span>${s.sym}</span>
<span id="p-${s.sym}">$${s.p.toFixed(2)}</span>
</div>`).join("");
}

function update(){
stocks.forEach(s=>{
let change=(Math.random()-0.5)*2;
s.p+=change;
let el=document.getElementById(`p-${s.sym}`);
el.innerText="$"+s.p.toFixed(2);
el.className=change>=0?"up":"down";
});
}

setInterval(update,1500);
render();

/* TIME */
setInterval(()=>{
document.getElementById("time").innerText=new Date().toLocaleTimeString();
},1000);

/* CHARTS */
new Chart(document.getElementById("chart1"),{
type:"line",
data:{labels:[1,2,3,4,5],datasets:[{data:[10,20,15,30,25]}]},
options:{plugins:{legend:{display:false}}}
});

new Chart(document.getElementById("chart2"),{
type:"bar",
data:{labels:["AI","Data","Infra"],datasets:[{data:[40,30,20]}]},
options:{plugins:{legend:{display:false}}}
});
</script>

</body>
</html>
