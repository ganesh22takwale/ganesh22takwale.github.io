<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRT | Intelligence System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>
:root{
--bg:#05070f;
--cyan:#00e5ff;
--glass:rgba(10,15,30,0.6);
--border:rgba(0,229,255,0.15);
--text:#e6edf3;
--sub:#7c8aa5;
--up:#00ff88;
--down:#ff4d4d;
}

/* BASE */
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:radial-gradient(circle at 20% 20%, #0a1a2f, #05070f 70%);
color:var(--text);
font-family:'Inter',sans-serif;
overflow:hidden;
}

/* FLOATING PARTICLE BG */
.canvas-bg{
position:fixed;
inset:0;
z-index:-1;
}

/* PANELS */
.panel{
position:absolute;
background:var(--glass);
backdrop-filter:blur(20px);
border:1px solid var(--border);
border-radius:16px;
padding:15px;
width:300px;
}

/* POSITIONS */
.left{top:20px;left:20px;height:85vh;overflow:auto;}
.right{top:20px;right:20px;height:60vh;overflow:auto;}
.bottom{bottom:20px;left:50%;transform:translateX(-50%);width:500px;text-align:center;}

/* CENTER */
.center{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
text-align:center;
}
h1{
font-size:3rem;
font-weight:700;
background:linear-gradient(90deg,#fff,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* CRYPTO */
.crypto{
display:flex;
justify-content:space-between;
font-size:12px;
padding:6px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

/* NEWS */
.news{
font-size:12px;
margin-bottom:10px;
color:var(--sub);
}

/* FOOTER */
footer{
position:fixed;
bottom:10px;
width:100%;
text-align:center;
font-size:11px;
color:var(--sub);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- CENTER -->
<div class="center">
<h1>Market Intelligence</h1>
<p style="color:var(--sub)">Real-time autonomous systems</p>
</div>

<!-- CRYPTO PANEL -->
<div class="panel left">
<b>Global Crypto Market</b>
<div id="crypto"></div>
</div>

<!-- AI NEWS -->
<div class="panel right">
<b>AI Intelligence Feed</b>
<div id="news"></div>
</div>

<!-- SIGNAL -->
<div class="panel bottom">
<b>System Signal</b>
<div id="signal">Analyzing global data...</div>
</div>

<footer>GRT — Global Reliability Technology</footer>

<script>
/* ======================
   PARTICLE BACKGROUND
====================== */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
for(let i=0;i<120;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:Math.random()-0.5,vy:Math.random()-0.5});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
ctx.fillStyle="#00e5ff";
ctx.fillRect(p.x,p.y,2,2);
});
requestAnimationFrame(animate);
}
animate();

/* ======================
   CRYPTO API (CoinGecko)
====================== */
async function loadCrypto(){
let res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1");
let data=await res.json();

document.getElementById("crypto").innerHTML=
data.map(c=>`
<div class="crypto">
<span>${c.symbol.toUpperCase()}</span>
<span>$${c.current_price}</span>
</div>
`).join("");
}

/* ======================
   AI NEWS (Free API)
====================== */
async function loadNews(){
try{
let res=await fetch("https://api.spaceflightnewsapi.net/v4/articles/?limit=5");
let data=await res.json();

document.getElementById("news").innerHTML=
data.results.map(n=>`
<div class="news">• ${n.title}</div>
`).join("");
}catch{
document.getElementById("news").innerHTML="Live feed unavailable";
}
}

/* ======================
   SIGNAL ENGINE
====================== */
function updateSignal(){
let signals=[
"AI sector momentum increasing",
"Crypto volatility detected",
"Market liquidity stable",
"Automation demand rising"
];
document.getElementById("signal").innerText=
signals[Math.floor(Math.random()*signals.length)];
}

/* INIT */
loadCrypto();
loadNews();
updateSignal();

setInterval(loadCrypto,60000);
setInterval(loadNews,60000);
setInterval(updateSignal,5000);

</script>

</body>
</html>
