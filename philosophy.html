<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRT Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
:root{
--cyan:#00e5ff;
--purple:#7c3aed;
--text:#e6edf3;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter';
background:#03040a;
color:var(--text);
overflow:hidden;
}

/* CANVAS */
#bg{
position:fixed;
inset:0;
z-index:-3;
}

/* GLOW LAYER */
.glow{
position:fixed;
inset:0;
z-index:-2;
background:
radial-gradient(circle at 20% 30%, rgba(0,229,255,0.15), transparent),
radial-gradient(circle at 80% 70%, rgba(124,58,237,0.15), transparent);
filter:blur(80px);
}

/* TEXT LAYER */
#text-layer{
position:fixed;
inset:0;
z-index:-1;
pointer-events:none;
}

/* WORDS */
.word{
position:absolute;
font-weight:700;
color:rgba(0,229,255,0.05);
white-space:nowrap;
}
.layer1{font-size:100px;}
.layer2{font-size:50px;}
.layer3{font-size:20px;}

/* CENTER UI */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

h1{
font-size:3.5rem;
background:linear-gradient(90deg,#fff,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{opacity:.6;margin-top:10px;}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="glow"></div>
<div id="text-layer"></div>

<div class="center">
<h1>GRT Intelligence</h1>
<p>Architecting Autonomous Systems</p>
</div>

<script>
/* =========================
   THREE ENGINE
========================= */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

const renderer=new THREE.WebGLRenderer({
canvas:document.getElementById("bg"),
alpha:true,
antialias:true
});
renderer.setSize(innerWidth,innerHeight);

/* PARTICLES */
const pGeo=new THREE.BufferGeometry();
const pCount=2500;
const pArr=new Float32Array(pCount*3);

for(let i=0;i<pArr.length;i++){
pArr[i]=(Math.random()-0.5)*100;
}

pGeo.setAttribute('position',new THREE.BufferAttribute(pArr,3));

const pMat=new THREE.PointsMaterial({
size:0.02,
color:0x00e5ff
});

const particles=new THREE.Points(pGeo,pMat);
scene.add(particles);

/* TYPO SPHERE */
const words=["AI","DATA","SYSTEM","MARKET","SIGNAL","ALGO","INTEL","NETWORK"];

const group=new THREE.Group();

for(let i=0;i<300;i++){
const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");
canvas.width=256;
canvas.height=128;

ctx.fillStyle="white";
ctx.font="bold 40px Inter";
ctx.fillText(words[Math.floor(Math.random()*words.length)],20,60);

const texture=new THREE.CanvasTexture(canvas);

const material=new THREE.SpriteMaterial({
map:texture,
transparent:true,
opacity:0.9
});

const sprite=new THREE.Sprite(material);

const phi=Math.acos(-1+(2*i)/300);
const theta=Math.sqrt(300*Math.PI)*phi;

sprite.position.setFromSphericalCoords(6,phi,theta);
sprite.scale.set(1.8,0.9,1);

group.add(sprite);
}

scene.add(group);

camera.position.z=12;

/* ANIMATION */
function animate(){
requestAnimationFrame(animate);

particles.rotation.y+=0.0006;
group.rotation.y+=0.002;
group.rotation.x+=0.001;

renderer.render(scene,camera);
}
animate();

/* =========================
   FLOATING TEXT
========================= */
const words2=["INTELLIGENCE","AUTOMATION","ANALYTICS","AI","SYSTEM","DATA","SIGNAL","NETWORK"];
const container=document.getElementById("text-layer");

function createWord(layer){
const el=document.createElement("div");
el.className="word layer"+layer;
el.innerText=words2[Math.floor(Math.random()*words2.length)];

el.style.left=Math.random()*100+"%";
el.style.top=Math.random()*100+"%";

container.appendChild(el);

let speed=Math.random()*0.3;

function move(){
let x=parseFloat(el.style.left);
let y=parseFloat(el.style.top);

x+=speed*0.05;
y+=speed*0.03;

if(x>100) x=0;
if(y>100) y=0;

el.style.left=x+"%";
el.style.top=y+"%";

requestAnimationFrame(move);
}
move();
}

for(let i=0;i<20;i++) createWord(1);
for(let i=0;i<30;i++) createWord(2);
for(let i=0;i<40;i++) createWord(3);

/* =========================
   PARALLAX + CAMERA
========================= */
window.addEventListener("mousemove",e=>{
let x=(e.clientX/window.innerWidth-0.5)*20;
let y=(e.clientY/window.innerHeight-0.5)*20;

camera.position.x=x*0.15;
camera.position.y=-y*0.15;

container.style.transform=`translate(${x}px,${y}px)`;
});

/* =========================
   RESIZE
========================= */
window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
