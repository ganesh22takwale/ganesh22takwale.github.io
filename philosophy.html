<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRT | Intelligence System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#05070f;
--cyan:#00e5ff;
--glass:rgba(10,15,30,0.6);
--border:rgba(0,229,255,0.15);
--text:#e6edf3;
--sub:#7c8aa5;
--up:#00ff88;
--down:#ff4d4d;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:radial-gradient(circle at 20% 20%, #0a1a2f, #05070f 70%);
color:var(--text);
font-family:'Inter',sans-serif;
overflow:hidden;
}

/* THREE BACKGROUND */
#bg{position:fixed;inset:0;z-index:-1;}

/* GRID */
.layout{
display:grid;
grid-template-columns:300px 1fr 300px;
gap:20px;
padding:20px;
height:100vh;
}

/* PANEL */
.panel{
background:var(--glass);
border:1px solid var(--border);
border-radius:16px;
padding:15px;
backdrop-filter:blur(20px);
overflow:auto;
}

/* CENTER */
.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

h1{
font-size:3rem;
background:linear-gradient(90deg,#fff,#00e5ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* LISTS */
.row{
display:flex;
justify-content:space-between;
font-size:12px;
padding:6px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

/* NEWS */
.news{font-size:12px;margin-bottom:8px;color:var(--sub);}

/* FOOTER */
footer{
position:fixed;
bottom:10px;
width:100%;
text-align:center;
font-size:11px;
color:var(--sub);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="layout">

<!-- LEFT -->
<div class="panel">
<h3>Crypto Market</h3>
<div id="crypto"></div>

<h3 style="margin-top:15px">Stocks</h3>
<div id="stocks"></div>
</div>

<!-- CENTER -->
<div class="panel center">
<h1>Market Intelligence</h1>
<p style="color:var(--sub)">Systems that earn > manual effort</p>

<canvas id="chart" style="height:200px"></canvas>
</div>

<!-- RIGHT -->
<div class="panel">
<h3>AI Intelligence</h3>
<div id="news"></div>

<h3 style="margin-top:15px">System Signal</h3>
<div id="signal"></div>
</div>

</div>

<footer>GRT — Global Reliability Technology</footer>

<script>
/* =======================
   THREE BACKGROUND
======================= */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('bg'),alpha:true});
renderer.setSize(innerWidth,innerHeight);

const geo=new THREE.IcosahedronGeometry(2,1);
const mat=new THREE.MeshBasicMaterial({color:0x00e5ff,wireframe:true,opacity:0.2,transparent:true});
const mesh=new THREE.Mesh(geo,mat);
scene.add(mesh);

camera.position.z=6;

function animate(){
requestAnimationFrame(animate);
mesh.rotation.y+=0.004;
renderer.render(scene,camera);
}
animate();

/* =======================
   CRYPTO API
======================= */
async function loadCrypto(){
let res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&per_page=10");
let data=await res.json();

document.getElementById("crypto").innerHTML=
data.map(c=>`
<div class="row">
<span>${c.symbol.toUpperCase()}</span>
<span>$${c.current_price}</span>
</div>`).join("");
}

/* =======================
   STOCK SIMULATION
======================= */
const stocks=[
{sym:"AAPL",p:220},
{sym:"MSFT",p:415},
{sym:"NVDA",p:870}
];

function renderStocks(){
document.getElementById("stocks").innerHTML=
stocks.map(s=>`
<div class="row">
<span>${s.sym}</span>
<span id="s-${s.sym}">$${s.p.toFixed(2)}</span>
</div>`).join("");
}

function updateStocks(){
stocks.forEach(s=>{
s.p+=(Math.random()-0.5)*2;
document.getElementById(`s-${s.sym}`).innerText="$"+s.p.toFixed(2);
});
}

/* =======================
   NEWS API
======================= */
async function loadNews(){
let res=await fetch("https://api.spaceflightnewsapi.net/v4/articles/?limit=5");
let data=await res.json();

document.getElementById("news").innerHTML=
data.results.map(n=>`<div class="news">• ${n.title}</div>`).join("");
}

/* =======================
   SIGNAL ENGINE
======================= */
function signal(){
const arr=[
"AI sector rising",
"Crypto volatility high",
"Liquidity stable",
"Automation demand increasing"
];
document.getElementById("signal").innerText=arr[Math.floor(Math.random()*arr.length)];
}

/* =======================
   CHART
======================= */
new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:["1","2","3","4","5"],
datasets:[{data:[10,20,15,25,30]}]
},
options:{plugins:{legend:{display:false}}}
});

/* INIT */
loadCrypto();
loadNews();
renderStocks();
signal();

setInterval(loadCrypto,60000);
setInterval(loadNews,60000);
setInterval(updateStocks,2000);
setInterval(signal,4000);
</script>

</body>
</html>
