<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRT | NEURAL ARCHITECT OS</title>

    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --accent: #00f2ff;
            --secondary: #7000ff;
            --bg-dark: #02040a;
            --glass: rgba(0, 10, 20, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100dvh; /* Mobile support */
            cursor: crosshair;
        }

        /* VIRTUAL HUD OVERLAY */
        #hud-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            border: 20px solid transparent;
            border-image: radial-gradient(circle, transparent 70%, rgba(0, 242, 255, 0.05) 100%) 30;
            z-index: 100;
        }

        /* ANIMATED BACKGROUND CANVAS */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            filter: blur(1px) contrast(1.2);
        }

        /* TOP NAVIGATION / STATUS BAR */
        .status-bar {
            position: fixed;
            top: 0; width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: var(--accent);
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 101;
            letter-spacing: 2px;
        }

        /* MAIN ARCHITECTURE TITLE */
        .hero-section {
            position: absolute;
            top: 15%;
            left: 5%;
            z-index: 10;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: clamp(2rem, 8vw, 4.5rem);
            line-height: 0.9;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.3));
        }

        /* FLOATING SPATIAL MODULES */
        .spatial-node {
            position: absolute;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 2px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            max-width: 300px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .spatial-node:hover {
            border-color: var(--accent);
            transform: scale(1.02) translateY(-5px);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
        }

        /* CIRCULAR PROGRESS MATRIX */
        .matrix-ring {
            position: fixed;
            bottom: -50px;
            right: -50px;
            width: 300px;
            height: 300px;
            border: 2px dashed var(--accent);
            border-radius: 50%;
            opacity: 0.2;
            animation: spin 20s linear infinite;
        }

        /* MOBILE OPTIMIZED DATA GRID */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .data-bit {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            border-left: 2px solid var(--secondary);
        }

        /* BUTTONS */
        .btn-glitch {
            margin-top: 20px;
            padding: 15px 30px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Syncopate';
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .btn-glitch:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent);
        }

        /* RESPONSIVE LAYOUT */
        @media (max-width: 768px) {
            .hero-section { top: 10%; width: 90%; }
            .spatial-node { position: relative; margin: 20px auto; top: 0 !important; left: 0 !important; right: 0 !important; }
            body { overflow-y: auto; } /* Scrollable on mobile */
            .matrix-ring { display: none; }
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="hud-overlay"></div>
    <canvas id="bg-canvas"></canvas>
    <div class="matrix-ring"></div>

    <div class="status-bar">
        <div id="clock">00:00:00</div>
        <div>GRT_CORE_v7.0 // ACTIVE_NODE: 04</div>
        <div id="battery">SYNCING...</div>
    </div>

    <section class="hero-section">
        <p style="color: var(--accent); letter-spacing: 5px; font-size: 12px; margin-bottom: 10px;">PHILOSOPHY OF ARCHITECTURE</p>
        <h1>SYSTEMIC<br><span style="color: #fff;">EVOLUTION</span></h1>
        
        <div class="spatial-node" style="margin-top: 40px; border-left: 4px solid var(--accent);">
            <div style="font-family: 'Share Tech Mono'; color: var(--accent);">[ MEMORY_EXPANSION ]</div>
            <p style="font-size: 14px; opacity: 0.8; margin-top: 10px;">
                Intelligence requires context. We build spatial memory maps that allow data to reside in the dimensions where it was created.
            </p>
            <div class="data-grid">
                <div class="data-bit">LATENCY: 0.04ms</div>
                <div class="data-bit">SYNC: GLOBAL</div>
            </div>
        </div>

        <button class="btn-glitch" onclick="triggerSequence()">UPGRADE PROTOCOL</button>
    </section>

    <div class="spatial-node" style="top: 20%; right: 5%; width: 250px;">
        <div style="font-family: 'Share Tech Mono';">LIVE_TELEMETRY</div>
        <hr style="opacity: 0.2; margin: 10px 0;">
        <div id="metrics-container">
            </div>
    </div>

    <script>
        // 1. DYNAMIC BACKGROUND (THREE.JS)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const geometry = new THREE.TorusKnotGeometry(10, 3, 100, 16);
        const material = new THREE.MeshBasicMaterial({ 
            color: 0x00f2ff, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.15 
        });
        const torus = new THREE.Mesh(geometry, material);
        scene.add(torus);

        camera.position.z = 30;

        function animate() {
            requestAnimationFrame(animate);
            torus.rotation.x += 0.002;
            torus.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        // 2. LIVE DATA FEED
        const metrics = [
            { label: "NEURAL_LOAD", val: 88, unit: "%" },
            { label: "FLUX_STATE", val: 1.04, unit: "ghz" },
            { label: "ETHICS_ALIGN", val: 99, unit: "%" }
        ];

        function updateMetrics() {
            const container = document.getElementById('metrics-container');
            container.innerHTML = metrics.map(m => `
                <div style="margin-bottom: 15px;">
                    <div style="display:flex; justify-content:space-between; font-size: 10px; opacity:0.6;">
                        <span>${m.label}</span>
                        <span>${(m.val + Math.random()).toFixed(2)}${m.unit}</span>
                    </div>
                    <div style="width:100%; height:2px; background:rgba(255,255,255,0.1); margin-top:5px;">
                        <div style="width:${m.val}%; height:100%; background:var(--accent); box-shadow: 0 0 10px var(--accent);"></div>
                    </div>
                </div>
            `).join('');
        }
        setInterval(updateMetrics, 1000);

        // 3. CLOCK & UI
        function updateUI() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateUI, 1000);

        // 4. INTERACTION SEQUENCE
        function triggerSequence() {
            gsap.to(torus.scale, { x: 2, y: 2, z: 2, duration: 0.5, yoyo: true, repeat: 1 });
            gsap.to("body", { backgroundColor: "#100020", duration: 0.2, yoyo: true, repeat: 1 });
            alert("PROTOCOL UPGRADED: Neural Architecture Expanded.");
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 5. TOUCH/MOUSE INTERACTION
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;
            gsap.to(torus.rotation, { x: y * 2, y: x * 2, duration: 2 });
        });
    </script>
</body>
</html>
