<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRT Spatial Intelligence OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* 🌅 ENVIRONMENT */
.bg{
position:fixed;inset:0;
background:
radial-gradient(circle at 50% 55%, rgba(120,255,255,.25), transparent 60%),
linear-gradient(to bottom,#010308,#041a3a,#000);
z-index:-3;
}

/* 🌊 OCEAN */
#waves{
position:fixed;
bottom:0;
width:100%;
height:250px;
z-index:-1;
}

/* 🧠 NEURAL */
#particles{
position:fixed;
inset:0;
z-index:-2;
}

/* 🌀 PARALLAX */
.layer{
transition:transform .2s ease;
}

/* LAYOUT */
.container{
display:flex;
justify-content:space-between;
align-items:center;
height:100vh;
padding:60px;
}

/* LEFT */
.left{max-width:600px;}

h1{
font-size:clamp(2.8rem,5vw,4.5rem);
font-weight:600;
}

h1 span{
background:linear-gradient(90deg,#7df9ff,#c084fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* MODULE GRID */
.grid{
margin-top:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.cell{
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.03);
cursor:pointer;
transition:.3s;
}

.cell:hover{
background:rgba(125,249,255,.1);
transform:translateY(-4px);
}

/* 💎 FLOATING PANEL */
.panel{
width:300px;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.2);
box-shadow:0 0 50px rgba(125,249,255,.2);
}

/* ALGO VISUAL */
.bars{
display:flex;
gap:4px;
margin-top:15px;
}
.bar{
width:6px;
background:#7df9ff;
animation:up 1s infinite ease-in-out;
}
@keyframes up{
0%,100%{height:10px}
50%{height:40px}
}

/* FLOAT WINDOW */
.window{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:500px;
background:#111;
padding:30px;
border-radius:20px;
display:none;
z-index:10;
}

/* timeline */
.timeline{
margin-top:40px;
font-size:14px;
}
.timeline div{
opacity:0;
animation:fade 1s forwards;
}
.timeline div:nth-child(2){animation-delay:.5s}
.timeline div:nth-child(3){animation-delay:1s}

@keyframes fade{
to{opacity:1}
}

/* CTA */
.cta{
margin-top:20px;
display:inline-block;
padding:12px 25px;
border-radius:20px;
background:#7df9ff;
color:#000;
cursor:pointer;
}

</style>
</head>

<body>

<div class="bg"></div>
<canvas id="particles"></canvas>
<canvas id="waves"></canvas>

<div class="container">

<!-- LEFT -->
<div class="left layer" data-depth="0.2">

<h1>
Intelligence is not automated.<br>
<span>It is architected by GRT Lab.</span>
</h1>

<div class="grid">
<div class="cell" onclick="openWindow('Memory Systems')">Memory</div>
<div class="cell" onclick="openWindow('Alignment Logic')">Alignment</div>
<div class="cell" onclick="openWindow('Reliability Engineering')">Reliability</div>
<div class="cell" onclick="openWindow('Failure Control')">Failure</div>
<div class="cell" onclick="openWindow('Decision Integrity')">Decision</div>
<div class="cell" onclick="openWindow('Adaptive AI')">Adaptive</div>
</div>

<div class="cta" onclick="openWindow('Architecture Simulator')">
Architect Intelligence →
</div>

<div class="timeline">
<div>Ancient: Resilient systems in architecture</div>
<div>Industrial: Reliability engineering theory</div>
<div>AI Era: Alignment + robustness</div>
</div>

</div>

<!-- RIGHT -->
<div class="panel layer" data-depth="0.4">
<h3>Algorithm Activity</h3>

<div class="bars">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

</div>

</div>

<!-- FLOAT WINDOW -->
<div class="window" id="window">
<h3 id="title"></h3>
<canvas id="graph"></canvas>
<p id="desc"></p>
<div class="cta" onclick="closeWindow()">Close</div>
</div>

<script>

/* 🌀 PARALLAX */
document.addEventListener("mousemove",e=>{
document.querySelectorAll(".layer").forEach(el=>{
let d=el.dataset.depth;
let x=(innerWidth/2-e.clientX)*d/40;
let y=(innerHeight/2-e.clientY)*d/40;
el.style.transform=`translate(${x}px,${y}px)`;
});
});

/* 🧠 WINDOW */
function openWindow(name){
document.getElementById("window").style.display="block";
document.getElementById("title").innerText=name;
document.getElementById("desc").innerText="System module: "+name;

let c=document.getElementById("graph");
let ctx=c.getContext("2d");
c.width=400;c.height=200;
ctx.clearRect(0,0,400,200);

ctx.beginPath();
for(let i=0;i<400;i++){
let y=100+Math.sin(i*0.05)*50;
ctx.lineTo(i,y);
}
ctx.strokeStyle="#7df9ff";
ctx.stroke();
}

function closeWindow(){
document.getElementById("window").style.display="none";
}

/* 🌊 WAVES */
const wCanvas=document.getElementById("waves");
const wCtx=wCanvas.getContext("2d");
wCanvas.width=innerWidth;
wCanvas.height=250;

function waves(t){
wCtx.clearRect(0,0,innerWidth,250);
for(let i=0;i<3;i++){
wCtx.beginPath();
for(let x=0;x<innerWidth;x++){
let y=120+Math.sin(x*0.01+t+i)*20*i;
wCtx.lineTo(x,y);
}
wCtx.strokeStyle="rgba(125,249,255,0.2)";
wCtx.stroke();
}
requestAnimationFrame(()=>waves(t+0.02));
}
waves(0);

/* 🧠 PARTICLES */
const pCanvas=document.getElementById("particles");
const pCtx=pCanvas.getContext("2d");
pCanvas.width=innerWidth;
pCanvas.height=innerHeight;

let pts=[];
for(let i=0;i<60;i++){
pts.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight});
}

function drawParticles(){
pCtx.clearRect(0,0,innerWidth,innerHeight);
pts.forEach(a=>{
pts.forEach(b=>{
let dx=a.x-b.x,dy=a.y-b.y;
let d=Math.sqrt(dx*dx+dy*dy);
if(d<120){
pCtx.strokeStyle="rgba(125,249,255,"+(1-d/120)+")";
pCtx.beginPath();
pCtx.moveTo(a.x,a.y);
pCtx.lineTo(b.x,b.y);
pCtx.stroke();
}
});
pCtx.fillRect(a.x,a.y,2,2);
});
requestAnimationFrame(drawParticles);
}
drawParticles();

</script>

</body>
</html>
