<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRT Spatial OS</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Sora',sans-serif;
background:#000;
color:#fff;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;inset:0;
background:
radial-gradient(circle at 50% 60%, rgba(120,255,255,.2), transparent 60%),
linear-gradient(to bottom,#010308,#041a3a,#000);
z-index:-3;
}

/* WAVES */
#waves{
position:fixed;
bottom:0;
width:100%;
height:200px;
z-index:-1;
}

/* WINDOW */
.window{
position:absolute;
width:320px;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,.2);
box-shadow:0 0 40px rgba(125,249,255,.2);
cursor:grab;
}

.header{font-family:'Orbitron';margin-bottom:10px;}
.metric{margin-bottom:10px;}
.metric strong{display:block;font-size:18px}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
}

.cell{
padding:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
}

/* CTA */
.cta{
margin-top:10px;
padding:10px;
border-radius:20px;
background:#7df9ff;
color:#000;
text-align:center;
cursor:pointer;
}

/* HOLO PANEL */
.holo{
position:fixed;
bottom:120px;
left:50%;
transform:translateX(-50%) scale(0.8);
padding:20px 30px;
border-radius:20px;
background:rgba(0,255,255,0.05);
border:1px solid rgba(0,255,255,0.6);
box-shadow:0 0 40px rgba(0,255,255,0.6);
opacity:0;
transition:0.4s;
}

.holo.active{
opacity:1;
transform:translateX(-50%) scale(1);
}

/* TITLE */
.title{
position:absolute;
top:50px;
left:50px;
max-width:600px;
}

h1{font-size:3.5rem;}
h1 span{
background:linear-gradient(90deg,#7df9ff,#c084fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
</style>
</head>

<body>

<div class="bg"></div>
<canvas id="waves"></canvas>

<div class="title">
<h1>
Intelligence is not automated.<br>
<span>It is architected.</span>
</h1>
</div>

<!-- MODULES -->
<div class="window" style="top:200px;left:60px">
<div class="header">Modules</div>
<div class="grid">
<div class="cell" onclick="openModule('Memory')">Memory</div>
<div class="cell" onclick="openModule('Alignment')">Alignment</div>
<div class="cell" onclick="openModule('Reliability')">Reliability</div>
<div class="cell" onclick="openModule('Failure')">Failure</div>
<div class="cell" onclick="openModule('Decision')">Decision</div>
<div class="cell" onclick="openModule('Adaptive')">Adaptive</div>
</div>

<div class="cta" onclick="buildSystem()">Architect Intelligence →</div>
</div>

<!-- METRICS -->
<div class="window" style="top:180px;right:60px">
<div class="header">System Metrics</div>
<div class="metric"><strong id="t">98%</strong>Throughput</div>
<div class="metric"><strong id="m">512TB</strong>Memory</div>
<div class="metric"><strong id="r">99.97%</strong>Reliability</div>
<div class="metric"><strong id="d">12ms</strong>Latency</div>
</div>

<!-- HOLOGRAPHIC INFO PANEL -->
<div id="holo" class="holo">
<h3 id="hTitle"></h3>
<p id="hDesc"></p>
<div id="hMetrics"></div>
</div>

<script>

/* DATA */
const DATA={
Memory:{desc:"Stores contextual intelligence.",metrics:"512TB memory"},
Failure:{desc:"Prevents system breakdown.",metrics:"Risk ↓ 73%"},
Alignment:{desc:"Matches intent.",metrics:"97% alignment"},
Reliability:{desc:"Ensures consistency.",metrics:"99.97 uptime"},
Decision:{desc:"Optimizes choices.",metrics:"8ms latency"},
Adaptive:{desc:"Learns dynamically.",metrics:"Self evolving"}
};

/* MODULE CLICK */
function openModule(name){
document.getElementById("hTitle").innerText=name;
document.getElementById("hDesc").innerText=DATA[name].desc;
document.getElementById("hMetrics").innerText=DATA[name].metrics;

let panel=document.getElementById("holo");
panel.classList.add("active");
setTimeout(()=>panel.classList.remove("active"),3000);
}

/* WAVES */
const w=document.getElementById("waves");
const ctx=w.getContext("2d");
w.width=innerWidth;
w.height=200;

function waves(t){
ctx.clearRect(0,0,w.width,w.height);
for(let i=0;i<3;i++){
ctx.beginPath();
for(let x=0;x<w.width;x++){
let y=100+Math.sin(x*0.01+t+i)*20*i;
ctx.lineTo(x,y);
}
ctx.strokeStyle="rgba(125,249,255,0.2)";
ctx.stroke();
}
requestAnimationFrame(()=>waves(t+0.02));
}
waves(0);

/* THREE BACKGROUND */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({alpha:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);
renderer.domElement.style.position="fixed";
renderer.domElement.style.zIndex="-2";

camera.position.z=5;

const geo=new THREE.BufferGeometry();
let verts=[];
for(let i=0;i<1200;i++){
verts.push((Math.random()-0.5)*20,(Math.random()-0.5)*20,(Math.random()-0.5)*20);
}
geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));

const mat=new THREE.PointsMaterial({color:0x7df9ff,size:0.03});
const mesh=new THREE.Points(geo,mat);
scene.add(mesh);

function animate(){
requestAnimationFrame(animate);
mesh.rotation.y+=0.0007;
renderer.render(scene,camera);
}
animate();

/* 🔥 ARCHITECT BUILD EFFECT */
function buildSystem(){
let scale=1;
const interval=setInterval(()=>{
scale+=0.02;
mesh.scale.set(scale,scale,scale);
mesh.material.color.setRGB(1,0.5,0); // orange

if(scale>2){
clearInterval(interval);
setTimeout(()=>{
mesh.scale.set(1,1,1);
mesh.material.color.set(0x7df9ff);
},1500);
}
},30);
}

/* LIVE DATA */
setInterval(()=>{
document.getElementById("t").innerText=(90+Math.random()*10).toFixed(0)+"%";
document.getElementById("m").innerText=(400+Math.random()*300).toFixed(0)+"TB";
document.getElementById("r").innerText=(99.5+Math.random()*0.5).toFixed(2)+"%";
document.getElementById("d").innerText=(5+Math.random()*20).toFixed(0)+"ms";
},3000);

</script>

</body>
</html>
