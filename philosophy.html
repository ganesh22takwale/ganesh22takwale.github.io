<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRT Philosophy</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* 🌅 SUNRISE + 🌊 OCEAN */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(50% 40% at 50% 0%, rgba(120,255,255,.25), transparent 60%),
    radial-gradient(60% 60% at 50% 100%, rgba(0,30,80,.9), #000 70%);
  z-index:-3;
}

/* CURSOR GLOW */
#cursorGlow{
  position:fixed;
  width:500px;height:500px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(125,249,255,.25), transparent 70%);
  pointer-events:none;
  z-index:-1;
  transform:translate(-50%,-50%);
}

/* CANVAS */
canvas{
  position:fixed;
  inset:0;
  z-index:-2;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:60px;
  opacity:0;
  transform:translateY(40px);
  animation:fadeUp 1.4s ease forwards;
}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0);}
}

.container{
  max-width:1200px;
  width:100%;
  display:grid;
  grid-template-columns:1fr 380px;
  gap:60px;
}

/* LEFT */
.logo{
  width:80px;
  margin-bottom:20px;
  filter:drop-shadow(0 0 20px #7df9ff);
}

h1{
  font-size:clamp(2.5rem,5vw,4rem);
  font-weight:800;
}

h1 span{
  background:linear-gradient(90deg,#7df9ff,#c084fc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* BUTTON */
.cta{
  margin-top:40px;
  display:inline-block;
  padding:14px 30px;
  border-radius:30px;
  background:linear-gradient(135deg,#7df9ff,#c084fc);
  color:#000;
  text-decoration:none;
}

/* PANEL */
.panel{
  backdrop-filter:blur(30px);
  background:rgba(255,255,255,.05);
  border-radius:25px;
  padding:25px;
  border:1px solid rgba(255,255,255,.2);
  transform:translateZ(0);
}

/* PARALLAX */
.parallax{
  transition:transform .2s ease;
}
</style>
</head>

<body>

<div id="cursorGlow"></div>
<canvas id="grid"></canvas>

<section class="hero">
  <div class="container">

    <div class="parallax" data-depth="0.2">
      <img src="grt-logo-11.png" class="logo">

      <h1>
        Intelligence is not automated.<br>
        <span>It is architected.</span>
      </h1>

      <p style="opacity:.7;margin-top:10px;">
        Production-grade AI built for memory, alignment & long-term reliability.
      </p>

      <a class="cta">Architect My Intelligence →</a>
    </div>

    <div class="panel parallax" data-depth="0.4">
      <h3>Engagement Models</h3>

      <div>3 Months → ↑120% ROI</div>
      <div>6 Months → ↑260% ROI</div>
      <div>12 Months → ↑420% ROI</div>
    </div>

  </div>
</section>

<script>
/* 🌀 PARALLAX */
document.addEventListener("mousemove",e=>{
  document.querySelectorAll(".parallax").forEach(el=>{
    let depth=el.dataset.depth;
    let x=(window.innerWidth/2 - e.clientX)*depth/40;
    let y=(window.innerHeight/2 - e.clientY)*depth/40;
    el.style.transform=`translate(${x}px,${y}px)`;
  });

  // cursor glow
  let glow=document.getElementById("cursorGlow");
  glow.style.left=e.clientX+"px";
  glow.style.top=e.clientY+"px";
});

/* ⚡ NEURAL GRID */
const canvas=document.getElementById("grid");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let nodes=[];
for(let i=0;i<80;i++){
  nodes.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-.5)*0.5,
    vy:(Math.random()-.5)*0.5
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  nodes.forEach(a=>{
    a.x+=a.vx;
    a.y+=a.vy;

    nodes.forEach(b=>{
      let dx=a.x-b.x;
      let dy=a.y-b.y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<120){
        ctx.strokeStyle="rgba(125,249,255,"+(1-dist/120)+")";
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.lineTo(b.x,b.y);
        ctx.stroke();
      }
    });

    ctx.fillStyle="#7df9ff";
    ctx.fillRect(a.x,a.y,2,2);
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
