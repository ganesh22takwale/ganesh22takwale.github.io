<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Research Lab</title>

<link rel="stylesheet" href="../styles.css">
</head>

<body class="lab-body">

<div class="lab-bg"></div>
<div class="lab-bg"></div>

<div class="lab-container">

  <h1 class="lab-title">AI Research Lab</h1>

  <div class="lab-nav">
    <a>Dashboard</a>
    <a>Neural Training</a>
    <a>System Map</a>
    <a>Vector Search</a>
  </div>

  <div class="lab-grid">

    <div class="lab-card glow big">
      <h2>System Status</h2>
      <p>All core systems operational</p>
      <div class="lab-meter"></div>
    </div>

    <div class="lab-card glow">
      <h2>Failure Rate</h2>
      <p>0.02%</p>
    </div>

    <div class="lab-card glow">
      <h2>Temperature</h2>
      <p>225°C</p>
    </div>

    <div class="lab-card glow">
      <h2>AI Confidence</h2>
      <p>94%</p>
    </div>

    <div class="lab-card glow wide">
      <h2>Weibull Analysis</h2>
      <p>Predictive failure modeling active</p>
    </div>

    <div class="lab-card glow wide">
      <h2>System Intelligence Feed</h2>
      <p>Real-time architecture signals flowing</p>
    </div>

  </div>

</div>

</body>
</html>
