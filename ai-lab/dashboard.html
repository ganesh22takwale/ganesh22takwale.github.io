<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Research Lab</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  overflow-x:hidden;
}

/* HEADER */
.lab-title {
  font-size:42px;
  padding:20px;
  color:#00f5ff;
}

.lab-nav {
  padding:0 20px 20px;
}
.lab-nav a {
  margin-right:15px;
  opacity:0.7;
  cursor:pointer;
}
.lab-nav a:hover { opacity:1; }

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  padding:20px;
  border-radius:20px;
  position:relative;
  overflow:hidden;
  transition:.3s;
}
.card:hover {
  transform:translateY(-5px);
  box-shadow:0 0 30px rgba(0,255,255,0.3);
}

.big { grid-column: span 2; }
.wide { grid-column: span 2; }

/* VALUE */
.value {
  font-size:28px;
  font-weight:bold;
}

/* PROGRESS */
.bar {
  height:6px;
  background:#ffffff22;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}
.bar span {
  display:block;
  height:100%;
  width:90%;
  background:linear-gradient(90deg,#00f5ff,#7a7aff);
}

/* WAVE */
canvas {
  width:100%;
}

/* ===== AI FLOOR ===== */
.ai-floor {
  position: relative;
  height: 300px;
  margin-top: 60px;
  overflow: hidden;
  background: linear-gradient(to top, #000, transparent);
}

#particles {
  position: absolute;
  width: 100%;
  height: 100%;
}

.center-logo {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  animation: float 4s ease-in-out infinite;
}

.center-logo img {
  width: 120px;
  filter: drop-shadow(0 0 20px #00f5ff);
}

@keyframes float {
  0%,100% { transform: translate(-50%, -50%) translateY(0); }
  50% { transform: translate(-50%, -50%) translateY(-10px); }
}
</style>
</head>

<body>

<h1 class="lab-title">AI Research Lab</h1>

<div class="lab-nav">
<a>Dashboard</a>
<a>Neural Training</a>
<a>System Map</a>
<a>Vector Search</a>
</div>

<div class="grid">

<div class="card big">
<h2>System Status</h2>
<p>All systems operational</p>
<div class="bar"><span></span></div>
</div>

<div class="card">
<h2>Failure Rate</h2>
<div class="value">0.02%</div>
</div>

<div class="card">
<h2>Temperature</h2>
<div class="value">225°C</div>
</div>

<div class="card">
<h2>AI Confidence</h2>
<div class="value">94%</div>
</div>

<div class="card wide">
<h2>Weibull Analysis</h2>
<canvas id="wave"></canvas>
</div>

<div class="card wide">
<h2>System Intelligence Feed</h2>
<p>Signals flowing...</p>
</div>

</div>

<!-- 🔥 AI VISUAL FLOOR -->
<div class="ai-floor">
  <canvas id="particles"></canvas>

  <div class="center-logo">
    <img src="grt-logo.png">
  </div>
</div>

<script>

/* ===== WAVE ===== */
const canvas = document.getElementById("wave");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = 100;

let t = 0;

function drawWave(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();
  for(let x=0;x<canvas.width;x++){
    let y = 50 + Math.sin((x+t)*0.03)*20;
    ctx.lineTo(x,y);
  }

  ctx.strokeStyle="#00f5ff";
  ctx.stroke();

  t+=2;
  requestAnimationFrame(drawWave);
}
drawWave();


/* ===== PARTICLES ===== */
const canvasP = document.getElementById("particles");
const ctxP = canvasP.getContext("2d");

canvasP.width = window.innerWidth;
canvasP.height = 300;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvasP.width,
    y: Math.random() * canvasP.height,
    speed: Math.random() * 1 + 0.2,
    size: Math.random() * 2
  });
}

function animateParticles() {
  ctxP.clearRect(0, 0, canvasP.width, canvasP.height);

  particles.forEach(p => {
    p.y -= p.speed;

    if (p.y < 0) {
      p.y = canvasP.height;
      p.x = Math.random() * canvasP.width;
    }

    ctxP.beginPath();
    ctxP.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctxP.fillStyle = "#00f5ff";
    ctxP.fill();
  });

  connect();
  requestAnimationFrame(animateParticles);
}

function connect() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i; j < particles.length; j++) {
      let dx = particles[i].x - particles[j].x;
      let dy = particles[i].y - particles[j].y;
      let dist = dx * dx + dy * dy;

      if (dist < 10000) {
        ctxP.beginPath();
        ctxP.strokeStyle = "rgba(0,255,255,0.05)";
        ctxP.moveTo(particles[i].x, particles[i].y);
        ctxP.lineTo(particles[j].x, particles[j].y);
        ctxP.stroke();
      }
    }
  }
}

animateParticles();

</script>

</body>
</html>
