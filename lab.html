<body>

<!-- 🧠 AI CORE -->
<canvas id="network"></canvas>

<!-- ⚡ CORE REACTOR -->
<div class="lab-neon-core" id="coreReactor">
  <img src="grt-logo-05.png">
</div>

<!-- 🧠 SIDE INFO PANEL -->
<div class="ai-side-panel">

  <div class="ai-box">
    <h4>System State</h4>
    <p id="stateText">Stable</p>
  </div>

  <div class="ai-box">
    <h4>Energy Level</h4>
    <p id="energyText">Medium</p>
  </div>

  <div class="ai-box">
    <h4>Decision Impact</h4>
    <p id="impactText">Neutral</p>
  </div>

</div>

<header class="header">
  <img src="grt-logo-11.png" class="logo-ignite">
  <span>Reliability Lab</span>
</header>

<section class="hero">
  <h1>Architectural Diagnostic</h1>
</section>

<section class="panel systems">

  <div class="system-grid">

    <button class="system-card decision" data-impact="15">Observability</button>
    <button class="system-card decision" data-impact="-10">Speed</button>
    <button class="system-card decision" data-impact="20">Fallbacks</button>

  </div>

  <div class="diagnostic-panel">
    <span id="scoreValue">72</span>

    <div class="score-bar">
      <div class="score-fill" id="scoreFill"></div>
    </div>

    <p id="diagnosticText">Awaiting decision...</p>
  </div>

</section>

<footer class="smart-footer">
  Global Reliability Technology
</footer>

<script src="assets/js/three-core.js"></script>
<script src="lab.js"></script>

</body>
