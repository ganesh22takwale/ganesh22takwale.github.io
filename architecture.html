<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRT Intelligence OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#020617;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.08);
--accent:#6366f1;
--green:#22c55e;
--red:#ef4444;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:radial-gradient(circle at 30% 30%, #1e1b4b, transparent), var(--bg);
color:#e2e8f0;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:15px 25px;
border-bottom:1px solid var(--border);
}

/* LAYOUT */
.layout{
display:grid;
grid-template-columns:2fr 1fr;
gap:15px;
padding:15px;
}

/* PANEL */
.card{
background:var(--glass);
border:1px solid var(--border);
border-radius:12px;
padding:15px;
}

/* GRAPH */
canvas{
width:100%;
height:350px;
background:#020617;
border-radius:10px;
}

/* TRACE */
.trace{
height:200px;
overflow:auto;
font-family:monospace;
font-size:12px;
}

/* AGENTS */
.agent{
padding:8px;
margin-bottom:6px;
border-radius:8px;
background:#0f172a;
display:flex;
justify-content:space-between;
}

/* BUTTON */
button{
padding:8px 12px;
background:var(--accent);
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<h3>GRT Intelligence OS</h3>
<div>Live System</div>
</div>

<div class="layout">

<!-- LEFT -->
<div>

<div class="card">
<h3>System Graph</h3>
<canvas id="graph"></canvas>
</div>

<div class="card">
<h3>Decision Trace</h3>
<div class="trace" id="trace"></div>
</div>

</div>

<!-- RIGHT -->
<div>

<div class="card">
<h3>Agents</h3>

<div class="agent">Signal Agent <span id="a1">idle</span></div>
<div class="agent">Reasoning Agent <span id="a2">idle</span></div>
<div class="agent">Execution Agent <span id="a3">idle</span></div>

</div>

<div class="card">
<h3>Control</h3>
<button onclick="run()">Inject Signal</button>
</div>

</div>

</div>

<script>

/* GRAPH ENGINE */
const canvas=document.getElementById("graph");
const ctx=canvas.getContext("2d");

let nodes=[
{x:100,y:200,label:"Signal"},
{x:300,y:80,label:"Reasoning"},
{x:500,y:220,label:"Execution"}
];

let edges=[[0,1],[1,2]];

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

// edges
edges.forEach(e=>{
ctx.beginPath();
ctx.moveTo(nodes[e[0]].x,nodes[e[0]].y);
ctx.lineTo(nodes[e[1]].x,nodes[e[1]].y);
ctx.strokeStyle="#6366f1";
ctx.stroke();
});

// nodes
nodes.forEach(n=>{
ctx.beginPath();
ctx.arc(n.x,n.y,8,0,Math.PI*2);
ctx.fillStyle="#6366f1";
ctx.fill();
ctx.fillText(n.label,n.x-20,n.y-15);
});
}

setInterval(draw,30);

/* TRACE */
function log(msg){
const el=document.getElementById("trace");
el.innerHTML+=`> ${msg}<br>`;
el.scrollTop=el.scrollHeight;
}

/* AGENT STATE */
function setAgent(id,state){
document.getElementById(id).innerText=state;
}

/* MOCK STREAM (replace with WebSocket later) */
function run(){

setAgent("a1","active");
log("Signal detected");

setTimeout(()=>{
setAgent("a1","done");
setAgent("a2","active");
log("Reasoning started");
},500);

setTimeout(()=>{
setAgent("a2","done");
setAgent("a3","active");
log("Decision executed");
},1000);

setTimeout(()=>{
setAgent("a3","done");
},1500);

}

</script>

</body>
</html>
