<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRT Intelligence Core</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#020617;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.08);
--accent:#6366f1;
--green:#22c55e;
--red:#ef4444;
--yellow:#f59e0b;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:radial-gradient(circle at 30% 30%, #1e1b4b, transparent),
#020617;
color:#e2e8f0;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:20px 30px;
border-bottom:1px solid var(--border);
}

/* LAYOUT */
.layout{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
padding:20px;
}

/* GRAPH */
.graph{
height:300px;
position:relative;
border:1px solid var(--border);
border-radius:12px;
overflow:hidden;
}

.node{
position:absolute;
padding:10px;
background:var(--glass);
border:1px solid var(--border);
border-radius:10px;
font-size:12px;
}

.signal{
position:absolute;
width:8px;
height:8px;
background:var(--accent);
border-radius:50%;
animation:move 2s linear infinite;
}

@keyframes move{
0%{left:10%; top:50%;}
50%{left:50%; top:20%;}
100%{left:90%; top:60%;}
}

/* LOG */
.log{
height:200px;
overflow:auto;
font-family:monospace;
font-size:12px;
border:1px solid var(--border);
padding:10px;
border-radius:10px;
}

/* STATUS PANEL */
.panel{
border:1px solid var(--border);
padding:15px;
border-radius:12px;
}

.metric{
margin-bottom:10px;
}

/* BUTTONS */
button{
margin:5px;
padding:10px;
border:none;
border-radius:8px;
background:var(--accent);
color:white;
cursor:pointer;
}

button:hover{
opacity:.8;
}
</style>
</head>

<body>

<div class="header">
<h2>GRT Intelligence Core</h2>
<div>Live System</div>
</div>

<div class="layout">

<!-- LEFT SIDE -->
<div>

<div class="graph" id="graph">

<div class="node" style="left:10%;top:50%">Signal Agent</div>
<div class="node" style="left:50%;top:20%">Reasoning Core</div>
<div class="node" style="left:85%;top:60%">Execution</div>

<div class="signal"></div>

</div>

<div class="panel" style="margin-top:20px;">
<h3>Event Stream</h3>
<div class="log" id="log"></div>
</div>

</div>

<!-- RIGHT SIDE -->
<div>

<div class="panel">
<h3>System State</h3>

<div class="metric">Active Signals: <span id="signals">0</span></div>
<div class="metric">Confidence: <span id="confidence">0%</span></div>
<div class="metric">Risk Level: <span id="risk">LOW</span></div>

</div>

<div class="panel" style="margin-top:20px;">
<h3>Control Center</h3>

<button onclick="injectSignal()">Inject Signal</button>
<button onclick="shock()">Market Shock</button>
<button onclick="clearLog()">Clear</button>

</div>

</div>

</div>

<script>

let signals=0;

function log(msg,color="white"){
const el=document.getElementById("log");
el.innerHTML+=`<div style="color:${color}">> ${msg}</div>`;
el.scrollTop=el.scrollHeight;
}

function injectSignal(){
signals++;
document.getElementById("signals").innerText=signals;

log("New signal detected", "#22c55e");
log("Running inference...");
log("Decision generated");

updateMetrics();
}

function shock(){
log("⚠ Market volatility spike detected", "#ef4444");
document.getElementById("risk").innerText="HIGH";
document.getElementById("risk").style.color="#ef4444";
}

function updateMetrics(){
document.getElementById("confidence").innerText=
(Math.random()*100).toFixed(1)+"%";

let risk=["LOW","MEDIUM","HIGH"];
let r=risk[Math.floor(Math.random()*3)];

document.getElementById("risk").innerText=r;
document.getElementById("risk").style.color=
r==="HIGH"?"#ef4444":r==="MEDIUM"?"#f59e0b":"#22c55e";
}

function clearLog(){
document.getElementById("log").innerHTML="";
}

</script>

</body>
</html>
