<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Reliability Technology | Vanguard Neural OS</title>

<style>

/* ================= CORE DESIGN ================= */
:root{
  --bg:#04060c;
  --cyan:#00e5ff;
  --glass:rgba(255,255,255,0.05);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:system-ui;
  background:var(--bg);
  color:var(--cyan);
  overflow:hidden;
}

/* ================= HUD ================= */
#hud{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:0.5px solid rgba(0,255,255,0.2);
  backdrop-filter:blur(25px);
}

.pulse{
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%{opacity:0.3}
  50%{opacity:1}
  100%{opacity:0.3}
}

/* ================= NAV ================= */
nav{
  display:flex;
  gap:15px;
  padding:10px;
}

nav div{
  cursor:pointer;
}

/* ================= MAIN VIEW ================= */
#view{
  padding:12px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:12px;
}

/* ================= PANEL ================= */
.panel{
  backdrop-filter:blur(25px);
  background:var(--glass);
  border:0.5px solid rgba(0,255,255,0.2);
  padding:14px;
  border-radius:14px;
  transition:transform 0.3s ease;
}

/* ================= MOBILE ================= */
@media(max-width:600px){
  body{font-size:12px;}
}

</style>
</head>

<body>

<!-- ================= HUD ================= -->
<div id="hud">
  <div>System Health: <span class="pulse">●</span></div>
  <div>Node Status: ACTIVE</div>
</div>

<!-- ================= NAV ================= -->
<nav>
  <div onclick="Router.load('home')">Home</div>
  <div onclick="Router.load('philosophy.html')">Philosophy</div>
  <div onclick="Router.load('lab.html')">Lab</div>
  <div onclick="Router.load('insights.html')">Insights</div>
</nav>

<!-- ================= VIEW ================= -->
<div id="view">
  <div class="panel">
    <h3>System Core</h3>
    <div id="state"></div>
  </div>

  <div class="panel">
    <h3>Neural Mesh (Digital Twin)</h3>
    <canvas id="mesh"></canvas>
  </div>

  <div class="panel" id="content">
    Loading...
  </div>
</div>

<script>

/* ======================================================
   SPA CONTENT LOADER
====================================================== */

const Router = {

  async load(page){

    if(page==="home"){
      document.getElementById("content").innerHTML =
      "Welcome to Vanguard Neural OS";
      return;
    }

    try{
      let res = await fetch(page);
      let html = await res.text();

      let parser = new DOMParser();
      let doc = parser.parseFromString(html,"text/html");

      let bodyContent = doc.body.innerHTML;

      document.getElementById("content").innerHTML = bodyContent;

    }catch{
      document.getElementById("content").innerText="Load error";
    }
  }
};

/* ======================================================
   PHYSICS ENGINE (Hooke’s Law)
   F = -kx → smooth inertia UI
====================================================== */

function spring(current,target){
  const k=0.08;
  return current + (-k*(current-target));
}

/* ======================================================
   STATE ENGINE
====================================================== */

let risk=0.5;

setInterval(()=>{
  risk += (Math.random()-0.5)*0.1;
  risk=Math.max(0,Math.min(1,risk));

  document.getElementById("state").innerText =
    "Risk Level: "+risk.toFixed(2);

},1000);

/* ======================================================
   NEURAL MESH (DIGITAL TWIN)
====================================================== */

const canvas=document.getElementById("mesh");
const ctx=canvas.getContext("2d");

canvas.width=300;
canvas.height=200;

let nodes = Array.from({length:40},()=>({
  x:Math.random()*300,
  y:Math.random()*200,
  vx:(Math.random()-0.5),
  vy:(Math.random()-0.5)
}));

function drawMesh(){

  ctx.clearRect(0,0,300,200);

  nodes.forEach(n=>{

    n.x+=n.vx;
    n.y+=n.vy;

    if(n.x<0||n.x>300)n.vx*=-1;
    if(n.y<0||n.y>200)n.vy*=-1;

    ctx.fillStyle="#00e5ff";
    ctx.fillRect(n.x,n.y,2,2);

    nodes.forEach(o=>{
      let dx=n.x-o.x;
      let dy=n.y-o.y;
      let d=Math.sqrt(dx*dx+dy*dy);

      if(d<80){
        ctx.strokeStyle="rgba(0,255,255,"+(1-d/80)+")";
        ctx.beginPath();
        ctx.moveTo(n.x,n.y);
        ctx.lineTo(o.x,o.y);
        ctx.stroke();
      }
    });

  });

  requestAnimationFrame(drawMesh);
}

drawMesh();

/* ======================================================
   INIT
====================================================== */

Router.load("home");

</script>

</body>
